{% extends 'base.html' %}

{% block title %}Register - SYRA{% endblock %}

{% block content %}
<div style="max-width: 500px; margin: 2rem auto;">
    <div class="card">
        <h2 style="text-align: center; margin-bottom: 1.5rem;">Create SYRA Account</h2>
        
        <form method="post">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" 
                       placeholder="Choose a username" required>
            </div>
            
            <div class="form-group">
                <label for="national_id">Egyptian National ID *</label>
                <input type="text" id="national_id" name="national_id" 
                       placeholder="Enter 14-digit National ID" 
                       required maxlength="14" pattern="\d{14}">
                <small style="color: #6b7280;">Must be exactly 14 digits</small>
            </div>
            
            <div class="form-group">
                <label for="first_name">First Name</label>
                <input type="text" id="first_name" name="first_name" 
                       placeholder="Enter first name">
            </div>
            
            <div class="form-group">
                <label for="last_name">Last Name</label>
                <input type="text" id="last_name" name="last_name" 
                       placeholder="Enter last name">
            </div>
            
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" 
                       placeholder="Enter email address">
            </div>
            
            <div class="form-group">
                <label for="phone_number">Phone Number</label>
                <input type="text" id="phone_number" name="phone_number" 
                       placeholder="Enter 11-digit phone number" maxlength="11">
            </div>
            
            <div class="form-group">
                <label for="password">Password *</label>
                <input type="password" id="password" name="password" 
                       placeholder="Create a password" required minlength="8">
                <small style="color: #6b7280;">Must be at least 8 characters</small>
            </div>
            
            <div class="form-group">
                <label for="password_confirm">Confirm Password *</label>
                <input type="password" id="password_confirm" name="password_confirm" 
                       placeholder="Confirm your password" required>
            </div>
            
            <button type="submit" class="btn" style="width: 100%;">Register</button>
        </form>
        
        <p style="text-align: center; margin-top: 1rem;">
            Already have an account? 
            <a href="{% url 'login' %}" style="color: #2563eb;">Login here</a>
        </p>
    </div>
</div>
{% endblock %}
