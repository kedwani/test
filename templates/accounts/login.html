{% extends 'base.html' %}

{% block title %}Login - SYRA{% endblock %}

{% block content %}
<div style="max-width: 400px; margin: 4rem auto;">
    <div class="card">
        <h2 style="text-align: center; margin-bottom: 1.5rem;">Login to SYRA</h2>
        
        <form method="post">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="national_id">Egyptian National ID</label>
                <input type="text" id="national_id" name="national_id" 
                       placeholder="Enter 14-digit National ID" 
                       required maxlength="14" pattern="\d{14}">
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" 
                       placeholder="Enter password" required>
            </div>
            
            <button type="submit" class="btn" style="width: 100%;">Login</button>
        </form>
        
        <p style="text-align: center; margin-top: 1rem;">
            Don't have an account? 
            <a href="{% url 'register' %}" style="color: #2563eb;">Register here</a>
        </p>
    </div>
</div>
{% endblock %}
